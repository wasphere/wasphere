# Local development: Postgres only.
# Run the three app services yourself with `pnpm dev` against this database.
# For a full containerised stack, use the default docker-compose.yml instead.
services:
  postgres:
    image: postgres:16-alpine
    container_name: wasphere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wasphere
      POSTGRES_PASSWORD: wasphere_dev
      POSTGRES_DB: wasphere
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wasphere -d wasphere']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
